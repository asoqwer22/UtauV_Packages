name: Auto-label theme PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'themes/**'

permissions:
  contents: read        # read the manifest text from the PR head
  pull-requests: write  # add labels to the PR

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Detect theme type and apply label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const yamlFiles = files.filter(f =>
              f.status !== 'removed' &&
              f.filename.startsWith('themes/') &&
              (f.filename.endsWith('.yaml') || f.filename.endsWith('.yml'))
            );

            if (yamlFiles.length === 0) {
              core.info('No theme YAML files under themes/ changed. Nothing to label.');
              return;
            }

            const headOwner = pr.head.repo.owner.login;
            const headRepo = pr.head.repo.name;
            const headSha = pr.head.sha;

            const typeRegex = /^\s*type\s*:\s*["']?([A-Za-z_]+)["']?\s*$/m;
            const labelsToAdd = new Set();

            for (const file of yamlFiles) {
              let content = '';
              try {
                const res = await github.rest.repos.getContent({
                  owner: headOwner,
                  repo: headRepo,
                  path: file.filename,
                  ref: headSha,
                });
                content = Buffer.from(res.data.content, 'base64').toString('utf8');
              } catch (err) {
                core.warning(`Could not read ${file.filename}: ${err.message}`);
                continue;
              }

              const match = content.match(typeRegex);
              const type = match ? match[1].trim().toLowerCase() : '';

              if (type === 'singer_theme') {
                labelsToAdd.add('UtauV_SingerTheme');
              } else if (type === 'theme') {
                labelsToAdd.add('UtauV_Theme');
              } else {
                core.warning(`${file.filename}: unrecognised type '${type}', skipping.`);
              }
            }

            if (labelsToAdd.size === 0) {
              core.info('No recognised theme type found. No labels applied.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: Array.from(labelsToAdd),
            });

            core.info(`Applied labels: ${Array.from(labelsToAdd).join(', ')}`);
