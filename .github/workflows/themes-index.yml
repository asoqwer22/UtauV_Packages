
name: Regenerate themes.json

on:
  pull_request:
    branches:
      - main
    types:
      - closed

  workflow_dispatch:

jobs:
  regenerate-index:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (contains(github.event.pull_request.labels.*.name, 'UtauV_Theme') ||
        contains(github.event.pull_request.labels.*.name, 'UtauV_SingerTheme')))

    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the regenerated themes.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.THEMES_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate themes.json
        run: python3 .github/scripts/build_themes_index.py

      - name: Commit and push updated themes.json
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add themes.json
          git diff --cached --quiet || git commit -m "chore: regenerate themes.json [skip ci]"
          git push
